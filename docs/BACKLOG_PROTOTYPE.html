<title>FermentFreude — Backlog</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F7F6F2; --surface: #ffffff; --ink: #18181A; --ink-muted: #71717A; --ink-faint: #A1A1AA;
  --border: #E4E2DC; --border-strong: #C4C1BA;
  --sidebar-bg: #18181A; --sidebar-ink: #E4E2DC; --sidebar-muted: #8A8A96; --sidebar-active: #27272A;
  --p-critical: #B91C1C; --p-must: #B45309; --p-should: #1D4ED8; --p-nice: #71717A;
  --s-open-bg:#EFF6FF; --s-open-ink:#1D4ED8;
  --s-done-bg:#F0FDF4; --s-done-ink:#166534;
  --s-their-bg:#F5F3FF; --s-their-ink:#6D28D9;
  --s-partial-bg:#FFFBEB; --s-partial-ink:#92400E;
  --s-blocked-bg:#FEF2F2; --s-blocked-ink:#991B1B;
  --s-future-bg:#F1F5F9; --s-future-ink:#475569;
  --c-bug-bg:#FEF2F2; --c-bug-ink:#991B1B; --c-bug-br:#FECACA;
  --c-feature-bg:#EFF6FF; --c-feature-ink:#1E40AF; --c-feature-br:#BFDBFE;
  --c-content-bg:#F9FAFB; --c-content-ink:#374151; --c-content-br:#D1D5DB;
  --c-performance-bg:#FFF7ED; --c-performance-ink:#C2410C; --c-performance-br:#FED7AA;
  --c-design-bg:#FAF5FF; --c-design-ink:#7C3AED; --c-design-br:#DDD6FE;
  --c-org-bg:#F0F9FF; --c-org-ink:#075985; --c-org-br:#BAE6FD;
  --c-legal-bg:#FFF1F2; --c-legal-ink:#881337; --c-legal-br:#FECDD3;
  --c-decision-bg:#ECFEFF; --c-decision-ink:#0E7490; --c-decision-br:#A5F3FC;
  --sidebar-w:216px; --detail-w:376px; --radius:8px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 8px 24px rgba(0,0,0,.12);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:#111113; --surface:#1C1C1F; --ink:#F4F4F5; --ink-muted:#A1A1AA; --ink-faint:#52525B;
    --border:#2E2E32; --border-strong:#3F3F46;
    --sidebar-bg:#0C0C0E; --sidebar-ink:#D4D4D8; --sidebar-muted:#6E6E7A; --sidebar-active:#1C1C1F;
    --s-open-bg:#172554; --s-open-ink:#93C5FD; --s-done-bg:#052E16; --s-done-ink:#86EFAC;
    --s-their-bg:#2E1065; --s-their-ink:#C4B5FD; --s-partial-bg:#451A03; --s-partial-ink:#FCD34D;
    --s-blocked-bg:#450A0A; --s-blocked-ink:#FCA5A5; --s-future-bg:#1E293B; --s-future-ink:#94A3B8;
    --c-bug-bg:#450A0A; --c-bug-ink:#FCA5A5; --c-bug-br:#7F1D1D;
    --c-feature-bg:#172554; --c-feature-ink:#93C5FD; --c-feature-br:#1E3A8A;
    --c-content-bg:#27272A; --c-content-ink:#D4D4D8; --c-content-br:#3F3F46;
    --c-performance-bg:#431407; --c-performance-ink:#FDBA74; --c-performance-br:#7C2D12;
    --c-design-bg:#2E1065; --c-design-ink:#C4B5FD; --c-design-br:#4C1D95;
    --c-org-bg:#082F49; --c-org-ink:#7DD3FC; --c-org-br:#075985;
    --c-legal-bg:#4C0519; --c-legal-ink:#FDA4AF; --c-legal-br:#881337;
    --c-decision-bg:#083344; --c-decision-ink:#67E8F9; --c-decision-br:#155E75;
  }
}
:root[data-theme="light"] {
  --bg:#F7F6F2; --surface:#ffffff; --ink:#18181A; --ink-muted:#71717A; --ink-faint:#A1A1AA;
  --border:#E4E2DC; --border-strong:#C4C1BA;
  --sidebar-bg:#18181A; --sidebar-ink:#E4E2DC; --sidebar-muted:#8A8A96; --sidebar-active:#27272A;
  --s-open-bg:#EFF6FF; --s-open-ink:#1D4ED8; --s-done-bg:#F0FDF4; --s-done-ink:#166534;
  --s-their-bg:#F5F3FF; --s-their-ink:#6D28D9; --s-partial-bg:#FFFBEB; --s-partial-ink:#92400E;
  --s-blocked-bg:#FEF2F2; --s-blocked-ink:#991B1B; --s-future-bg:#F1F5F9; --s-future-ink:#475569;
  --c-bug-bg:#FEF2F2; --c-bug-ink:#991B1B; --c-bug-br:#FECACA;
  --c-feature-bg:#EFF6FF; --c-feature-ink:#1E40AF; --c-feature-br:#BFDBFE;
  --c-content-bg:#F9FAFB; --c-content-ink:#374151; --c-content-br:#D1D5DB;
  --c-performance-bg:#FFF7ED; --c-performance-ink:#C2410C; --c-performance-br:#FED7AA;
  --c-design-bg:#FAF5FF; --c-design-ink:#7C3AED; --c-design-br:#DDD6FE;
  --c-org-bg:#F0F9FF; --c-org-ink:#075985; --c-org-br:#BAE6FD;
  --c-legal-bg:#FFF1F2; --c-legal-ink:#881337; --c-legal-br:#FECDD3;
  --c-decision-bg:#ECFEFF; --c-decision-ink:#0E7490; --c-decision-br:#A5F3FC;
}
:root[data-theme="dark"] {
  --bg:#111113; --surface:#1C1C1F; --ink:#F4F4F5; --ink-muted:#A1A1AA; --ink-faint:#52525B;
  --border:#2E2E32; --border-strong:#3F3F46;
  --sidebar-bg:#0C0C0E; --sidebar-ink:#D4D4D8; --sidebar-muted:#6E6E7A; --sidebar-active:#1C1C1F;
  --s-open-bg:#172554; --s-open-ink:#93C5FD; --s-done-bg:#052E16; --s-done-ink:#86EFAC;
  --s-their-bg:#2E1065; --s-their-ink:#C4B5FD; --s-partial-bg:#451A03; --s-partial-ink:#FCD34D;
  --s-blocked-bg:#450A0A; --s-blocked-ink:#FCA5A5; --s-future-bg:#1E293B; --s-future-ink:#94A3B8;
  --c-bug-bg:#450A0A; --c-bug-ink:#FCA5A5; --c-bug-br:#7F1D1D;
  --c-feature-bg:#172554; --c-feature-ink:#93C5FD; --c-feature-br:#1E3A8A;
  --c-content-bg:#27272A; --c-content-ink:#D4D4D8; --c-content-br:#3F3F46;
  --c-performance-bg:#431407; --c-performance-ink:#FDBA74; --c-performance-br:#7C2D12;
  --c-design-bg:#2E1065; --c-design-ink:#C4B5FD; --c-design-br:#4C1D95;
  --c-org-bg:#082F49; --c-org-ink:#7DD3FC; --c-org-br:#075985;
  --c-legal-bg:#4C0519; --c-legal-ink:#FDA4AF; --c-legal-br:#881337;
  --c-decision-bg:#083344; --c-decision-ink:#67E8F9; --c-decision-br:#155E75;
}

html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;background:var(--bg);color:var(--ink);overflow:hidden;}
#app{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
#sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--sidebar-bg);color:var(--sidebar-ink);display:flex;flex-direction:column;overflow:hidden;z-index:10;}
.sidebar-brand{padding:18px 14px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.07);}
.sidebar-logo{width:30px;height:30px;background:#B91C1C;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;}
.sidebar-brand-name{font-size:13px;font-weight:600;color:var(--sidebar-ink);}
.sidebar-brand-sub{font-size:10px;color:var(--sidebar-muted);margin-top:1px;letter-spacing:.04em;text-transform:uppercase;}

#board-toggle{display:flex;flex-direction:column;gap:5px;padding:12px 12px 2px;}
.board-btn{width:100%;text-align:left;padding:8px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:var(--sidebar-muted);font-size:12px;font-weight:600;cursor:pointer;transition:background .12s,color .12s,border-color .12s;font-family:inherit;}
.board-btn:hover{background:rgba(255,255,255,.08);color:var(--sidebar-ink);}
.board-btn.active{background:rgba(185,28,28,.22);border-color:rgba(185,28,28,.45);color:#fff;}

#stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin:12px;background:rgba(255,255,255,.07);border-radius:8px;overflow:hidden;}
.stat-cell{background:rgba(255,255,255,.03);padding:10px 10px 8px;cursor:pointer;transition:background .15s;}
.stat-cell:hover{background:rgba(255,255,255,.08);}
.stat-num{font-size:22px;font-weight:700;color:var(--sidebar-ink);font-variant-numeric:tabular-nums;line-height:1;}
.stat-num.red{color:#F87171;}
.stat-label{font-size:10px;color:var(--sidebar-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.06em;}

#filter-nav{flex:1;overflow-y:auto;padding:6px 8px 16px;}
.fnav-sep{height:1px;background:rgba(255,255,255,.07);margin:6px 4px;}
.filter-btn{display:flex;align-items:center;gap:8px;width:100%;padding:6px 8px;background:none;border:none;border-radius:6px;color:var(--sidebar-muted);font-size:13px;cursor:pointer;text-align:left;transition:background .12s,color .12s;}
.filter-btn:hover{background:rgba(255,255,255,.07);color:var(--sidebar-ink);}
.filter-btn.active{background:rgba(255,255,255,.11);color:var(--sidebar-ink);font-weight:500;}
.fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.fcount{margin-left:auto;font-size:11px;color:var(--sidebar-muted);font-variant-numeric:tabular-nums;}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#toolbar{display:flex;align-items:center;gap:8px;padding:0 14px;height:50px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
#search{flex:1;max-width:260px;height:32px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-size:13px;background:var(--bg);color:var(--ink);outline:none;}
#search:focus{border-color:var(--border-strong);}
#search::placeholder{color:var(--ink-faint);}
.t-select{height:32px;border:1px solid var(--border);border-radius:6px;padding:0 8px;font-size:12px;background:var(--bg);color:var(--ink);cursor:pointer;outline:none;}
.t-spacer{flex:1;}
#btn-new{height:32px;padding:0 14px;background:#B91C1C;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .12s;}
#btn-new:hover{background:#9F1616;}
#item-list{flex:1;overflow-y:auto;padding:6px 8px;display:flex;flex-direction:column;gap:2px;}
.empty-msg{padding:48px;text-align:center;color:var(--ink-muted);}
.empty-msg strong{display:block;font-size:15px;margin-bottom:6px;color:var(--ink);}

/* CARDS — minimal row */
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0;cursor:pointer;transition:border-color .15s,box-shadow .15s;display:flex;align-items:center;min-height:36px;overflow:hidden;}
.item-card:hover{border-color:var(--border-strong);box-shadow:var(--shadow);}
.item-card.sel{border-color:#B91C1C;box-shadow:0 0 0 1px #B91C1C;}
.prail{width:3px;flex-shrink:0;align-self:stretch;}
.cbody{display:flex;align-items:center;flex:1;min-width:0;gap:10px;padding:0 10px 0 10px;}
.cid{font-size:10px;font-weight:700;color:var(--ink-faint);letter-spacing:.05em;white-space:nowrap;font-variant-numeric:tabular-nums;flex-shrink:0;width:52px;}
.ctitle{font-size:13px;font-weight:450;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.csdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-right:13px;}

/* PILLS & BADGES */
.spill{display:inline-flex;align-items:center;height:20px;padding:0 7px;border-radius:100px;font-size:11px;font-weight:500;white-space:nowrap;}
.spill.open{background:var(--s-open-bg);color:var(--s-open-ink);}
.spill.done{background:var(--s-done-bg);color:var(--s-done-ink);}
.spill.their-action{background:var(--s-their-bg);color:var(--s-their-ink);}
.spill.partial{background:var(--s-partial-bg);color:var(--s-partial-ink);}
.spill.blocked{background:var(--s-blocked-bg);color:var(--s-blocked-ink);}
.spill.future{background:var(--s-future-bg);color:var(--s-future-ink);}

.cbadge{display:inline-flex;align-items:center;height:20px;padding:0 7px;border-radius:4px;font-size:11px;font-weight:500;border:1px solid;white-space:nowrap;}
.cbadge.bug{background:var(--c-bug-bg);color:var(--c-bug-ink);border-color:var(--c-bug-br);}
.cbadge.feature{background:var(--c-feature-bg);color:var(--c-feature-ink);border-color:var(--c-feature-br);}
.cbadge.content{background:var(--c-content-bg);color:var(--c-content-ink);border-color:var(--c-content-br);}
.cbadge.performance{background:var(--c-performance-bg);color:var(--c-performance-ink);border-color:var(--c-performance-br);}
.cbadge.design{background:var(--c-design-bg);color:var(--c-design-ink);border-color:var(--c-design-br);}
.cbadge.org{background:var(--c-org-bg);color:var(--c-org-ink);border-color:var(--c-org-br);}
.cbadge.legal{background:var(--c-legal-bg);color:var(--c-legal-ink);border-color:var(--c-legal-br);}
.cbadge.decision{background:var(--c-decision-bg);color:var(--c-decision-ink);border-color:var(--c-decision-br);}

.etag{font-size:10px;font-weight:700;color:var(--ink-muted);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:0 5px;height:18px;display:inline-flex;align-items:center;letter-spacing:.04em;}
.ochip{font-size:10px;color:var(--ink-muted);background:var(--bg);border:1px solid var(--border);border-radius:100px;padding:0 6px;height:18px;display:inline-flex;align-items:center;}

/* DETAIL PANEL */
#detail-panel{width:0;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);overflow:hidden;transition:width .2s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
#detail-panel.open{width:var(--detail-w);}
#detail-inner{width:var(--detail-w);display:flex;flex-direction:column;height:100%;}
#detail-hd{padding:14px 14px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.dhd-row1{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.dhd-badges{display:flex;gap:6px;align-items:center;flex:1;flex-wrap:wrap;}
.dhd-edit-btn{height:28px;padding:0 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:500;color:var(--ink);cursor:pointer;transition:background .12s;}
.dhd-edit-btn:hover{background:var(--border);}
.dhd-close{width:28px;height:28px;background:none;border:none;color:var(--ink-muted);cursor:pointer;font-size:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;}
.dhd-close:hover{background:var(--bg);}
#detail-id{font-size:10px;font-weight:700;color:var(--ink-muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px;}
#detail-title{font-size:15px;font-weight:600;color:var(--ink);line-height:1.4;}
#detail-body{flex:1;overflow-y:auto;padding:14px;}
.dmeta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;margin-bottom:16px;}
.dm-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);margin-bottom:4px;font-weight:600;}
.dm-value{font-size:13px;color:var(--ink);display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.d-section{margin-bottom:16px;}
.d-block-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);margin-bottom:6px;font-weight:600;}
.d-text{font-size:13px;line-height:1.6;color:var(--ink);}
.d-text-box{font-size:13px;line-height:1.6;color:var(--ink);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px 11px;}
.d-textarea{width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;line-height:1.5;background:var(--bg);color:var(--ink);resize:vertical;min-height:80px;font-family:inherit;outline:none;}
.d-textarea:focus{border-color:var(--border-strong);}
#detail-ft{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}

/* BUTTONS */
.btn{height:32px;padding:0 13px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--ink);transition:background .12s;white-space:nowrap;font-family:inherit;}
.btn:hover{background:var(--bg);}
.btn-red{background:#B91C1C;color:#fff;border-color:#B91C1C;}
.btn-red:hover{background:#9F1616;}
.btn-ghost-red{color:#B91C1C;border-color:transparent;background:none;}
.btn-ghost-red:hover{background:#FEF2F2;border-color:#FECACA;}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
#modal-overlay.hidden{display:none;}
#modal{background:var(--surface);border-radius:12px;width:100%;max-width:548px;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);}
#modal-hd{padding:18px 18px 0;display:flex;align-items:center;gap:12px;}
#modal-title{font-size:15px;font-weight:600;color:var(--ink);}
#modal-close{margin-left:auto;width:28px;height:28px;background:none;border:none;color:var(--ink-muted);cursor:pointer;font-size:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;}
#modal-close:hover{background:var(--bg);}
#modal-body{padding:18px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:16px;}
#modal-ft{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;}
#modal-del{margin-right:auto;}

.fg{display:flex;flex-direction:column;gap:6px;}
.fl{font-size:12px;font-weight:600;color:var(--ink-muted);}
.fi{width:100%;height:36px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-size:13px;background:var(--bg);color:var(--ink);outline:none;font-family:inherit;}
.fi:focus{border-color:var(--border-strong);}
.fsel{width:100%;height:36px;border:1px solid var(--border);border-radius:6px;padding:0 8px;font-size:13px;background:var(--bg);color:var(--ink);outline:none;cursor:pointer;}
.fta{width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;line-height:1.5;background:var(--bg);color:var(--ink);resize:vertical;min-height:68px;font-family:inherit;outline:none;}
.fta:focus{border-color:var(--border-strong);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

.psel{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.popt{border:2px solid var(--border);border-radius:8px;padding:9px 6px 8px;cursor:pointer;text-align:center;background:var(--bg);transition:border-color .12s,background .12s;}
.popt:hover{border-color:var(--border-strong);}
.popt.sel{border-color:var(--pc);background:var(--pbg);}
.pswatch{width:20px;height:4px;border-radius:2px;margin:0 auto 5px;background:var(--pc);}
.plabel{font-size:11px;font-weight:600;color:var(--ink-muted);letter-spacing:.02em;}
.popt.sel .plabel{color:var(--pc);}

.esel{display:flex;gap:7px;}
.eopt{flex:1;height:32px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:800;cursor:pointer;background:var(--bg);color:var(--ink-muted);transition:border-color .12s,background .12s,color .12s;letter-spacing:.05em;font-family:inherit;}
.eopt:hover{border-color:var(--border-strong);color:var(--ink);}
.eopt.sel{background:var(--ink);color:var(--bg);border-color:var(--ink);}

.osel{display:flex;gap:7px;flex-wrap:wrap;}
.oopt{height:28px;padding:0 12px;border:1px solid var(--border);border-radius:100px;font-size:12px;cursor:pointer;background:var(--bg);color:var(--ink-muted);transition:border-color .12s,background .12s,color .12s;font-family:inherit;}
.oopt:hover{border-color:var(--border-strong);color:var(--ink);}
.oopt.sel{background:var(--ink);color:var(--bg);border-color:var(--ink);}

.slug-wrap{position:relative;display:flex;align-items:center;}
.slug-pre{position:absolute;left:10px;color:var(--ink-faint);font-family:'SF Mono','Fira Code',monospace;font-size:13px;pointer-events:none;}
.fi.slug{padding-left:18px;font-family:'SF Mono','Fira Code',monospace;font-size:12px;}

/* DECISION OPTIONS */
.dec-options{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.dec-opt{display:flex;gap:10px;padding:9px 10px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .12s,background .12s;}
.dec-opt:hover{border-color:var(--border-strong);}
.dec-opt.sel{border-color:var(--c-decision-ink);background:var(--c-decision-bg);}
.dec-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border-strong);flex-shrink:0;margin-top:2px;position:relative;}
.dec-opt.sel .dec-dot{border-color:var(--c-decision-ink);}
.dec-opt.sel .dec-dot::after{content:'';position:absolute;inset:2px;border-radius:50%;background:var(--c-decision-ink);}
.dec-name{font-size:13px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.dec-rec{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--c-decision-ink);background:var(--c-decision-bg);padding:1px 6px;border-radius:100px;}
.dec-desc{font-size:12px;color:var(--ink-muted);line-height:1.5;margin-top:2px;}

/* TODOS */
.todo-list{display:flex;flex-direction:column;gap:0;border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:8px;}
.todo-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border);background:var(--surface);}
.todo-item:last-child{border-bottom:none;}
.todo-item.tdone .todo-text{text-decoration:line-through;color:var(--ink-muted);}
.todo-cb{width:15px;height:15px;accent-color:#B91C1C;flex-shrink:0;cursor:pointer;}
.todo-text{flex:1;font-size:13px;color:var(--ink);line-height:1.4;}
.todo-del{background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:13px;padding:0 2px;line-height:1;flex-shrink:0;opacity:0;}
.todo-item:hover .todo-del{opacity:1;}
.todo-del:hover{color:#B91C1C;}
.todo-add-row{display:flex;gap:6px;align-items:center;}
.todo-add-row .fi{flex:1;height:30px;font-size:12px;}
.todo-add-btn{height:30px;padding:0 10px;background:#B91C1C;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;font-family:inherit;}
.todo-add-btn:hover{background:#9F1616;}
.todo-empty{font-size:12px;color:var(--ink-faint);padding:8px 0;}

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--ink);color:var(--bg);padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:200;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@media(max-width:860px){#detail-panel.open{position:fixed;inset:0 0 0 auto;width:min(100%,400px)!important;z-index:50;box-shadow:var(--shadow-lg);}}

<script>
const PRI_ORDER={critical:0,must:1,should:2,nice:3}
const EFF_ORDER={XS:0,S:1,M:2,L:3,XL:4}
const PRI_COLORS={critical:'#B91C1C',must:'#B45309',should:'#1D4ED8',nice:'#9CA3AF'}
const PRI_LABELS={critical:'Critical',must:'Must-have',should:'Should-have',nice:'Nice to have'}
const STATUS_LABELS={open:'Open',partial:'In Progress','their-action':'Their Action',blocked:'Blocked',done:'Done',future:'Parked'}
const STATUS_COLORS={open:'#3B82F6',partial:'#F59E0B','their-action':'#8B5CF6',blocked:'#EF4444',done:'#22C55E',future:'#94A3B8'}
const OWNER_LABELS={dev:'Dev',alaa:"Ala'a",david:'David',marcel:'Marcel'}

const SEED=[
  {id:'WEB-001',title:'Transfer ownership of production systems to FermentFreude',category:'org',priority:'critical',status:'open',effort:'M',owners:['dev','david'],slug:'',description:'Move MongoDB Atlas and Cloudflare R2 from Rafaela\'s personal account to FermentFreude ownership. Stripe, Brevo, domain, and Vercel are already correctly set up.',response:'Almost everything was set up under FermentFreude from day one. Stripe, Brevo, and the domain are already theirs. Two things need a quick account transfer: MongoDB Atlas and Cloudflare R2 are on Rafaela\'s personal account. Sorting this in the Wednesday morning meeting — about 10 minutes each.',notes:''},
  {id:'WEB-002',title:'Document system architecture',category:'org',priority:'critical',status:'done',effort:'M',owners:['dev'],slug:'',description:'Create a simple overview of all systems and how they work together: Next.js, Payload, Vercel, MongoDB, R2, Stripe, Brevo, GA4/GTM.',response:'Done. 30+ documentation files exist covering every system. SYSTEM_OVERVIEW.html shows all systems, who owns what, and how a customer booking flows end to end. Ready to share.',notes:''},
  {id:'WEB-003',title:'Dashboard / CMS onboarding session for founders',category:'org',priority:'must',status:'partial',effort:'S',owners:['dev','david','marcel'],slug:'',description:'Walk David and Marcel through the CMS: content edits, workshops, images, products, users, bookings, common mistakes to avoid.',response:'Written guides already exist (booking system guide, Brevo operations guide, workshop setup guide, dashboard quick reference). The live walkthrough still needs to be scheduled. A recorded Google Meet session would be most useful so they can refer back to it.',notes:''},
  {id:'WEB-004',title:'Full route QA and stability check',category:'bug',priority:'critical',status:'partial',effort:'M',owners:['dev','david','marcel'],slug:'',description:'Check all public routes for maintenance screens, timeout states, 404s, broken redirects, wrong language or inconsistent page states.',response:'Not yet done as a formal pass. Most useful when done together — David and Marcel know which routes matter most to customers and can flag language issues along the way. Developer checks for broken redirects, 404s, and maintenance screens in parallel.',notes:''},
  {id:'WEB-005',title:'Remove placeholder phone number',category:'content',priority:'must',status:'their-action',effort:'XS',owners:['david'],slug:'',description:'Replace placeholder phone number +43 664 1234567 with the correct Fermentfreude number everywhere on the site.',response:'David can fix this directly in the admin — no developer needed. Go to /admin → Globals → Business Info → Phone. Update the number and save. Done.',notes:''},
  {id:'WEB-006',title:'Remove public "Edit page in Admin" button',category:'bug',priority:'must',status:'done',effort:'XS',owners:['dev'],slug:'gastronomy',description:'The floating "Edit in Admin" button was showing for all public visitors on the Gastronomy and Fermentation pages.',response:'✓ Fixed and deployed. Removed EditPageLink from gastronomy/page.tsx and fermentation/page.tsx. Deployed to production via feature → staging → main.',notes:''},
  {id:'WEB-007',title:'Clean up German / English language mix',category:'content',priority:'must',status:'partial',effort:'M',owners:['dev','david','alaa'],slug:'',description:'Ensure German pages are fully German and English pages are fully English. Remove template fragments — especially FAQ, voucher, create-account and workshop modules.',response:'Some mixing is in the CMS — David can fix directly in /admin by switching the language toggle. Some is in code. Most useful step: David and Ala\'a go through the site on /de and /en and create a specific list of pages and sentences that are wrong. That list tells us exactly what to fix.',notes:''},
  {id:'WEB-008',title:'Align cancellation and voucher terms',category:'legal',priority:'critical',status:'their-action',effort:'M',owners:['david','dev'],slug:'',description:'Workshop pages, FAQ, voucher page and AGB must use the same cancellation and voucher validity rules. Current wording appears contradictory.',response:'Business and legal decision, not technical. David needs to decide: what are the actual cancellation rules? What is the voucher validity period? Once the rules are written down clearly, Rafaela updates the text across AGB, FAQ, workshop pages, and voucher page.',notes:''},
  {id:'WEB-009',title:'Privacy policy and tracking setup audit',category:'legal',priority:'critical',status:'their-action',effort:'M',owners:['david'],slug:'',description:'Check whether privacy policy, cookie consent and actual tracking tools match: GA4, GTM, Clarity, Meta Pixel if active.',response:'GTM is integrated in code. All GA4 e-commerce events are implemented. The privacy policy text and which tools are declared in it is a legal question — needs external legal review by someone familiar with Austrian/EU data law. What tools David wants active (Clarity, Meta Pixel) is also David\'s decision.',notes:''},
  {id:'WEB-010',title:'Review health claims and probiotic wording',category:'legal',priority:'critical',status:'their-action',effort:'M',owners:['david'],slug:'',description:'Check all health-related statements around probiotic, microbiome, immune system, digestion, gut-brain axis and balance wording.',response:'Content and legal decision. EU food law restricts what can be claimed about health benefits of fermented foods. David should review with a food or legal expert. Once safe wording is agreed and written, Rafaela updates the text.',notes:''},
  {id:'WEB-011',title:'Newsletter form connected to Brevo',category:'feature',priority:'must',status:'done',effort:'S',owners:['dev','david'],slug:'',description:'Check whether the newsletter form is visible, understandable, connected to Brevo and Double-Opt-in works. Legal aspect of using email addresses.',response:'Done. The newsletter form is connected to Brevo via a dedicated API route. Signups go into Brevo automatically. Double-opt-in and list management are handled inside the Brevo dashboard. All newsletter subscribers visible in Brevo contacts list.',notes:''},
  {id:'WEB-012',title:'Fix shop template remnants ("Payload Ecommerce Template")',category:'bug',priority:'must',status:'done',effort:'XS',owners:['dev'],slug:'shop',description:'Remove "Payload Ecommerce Template" and other template/default remnants from shop titles, metadata and UI.',response:'✓ Fixed and deployed. "Payload Ecommerce Template" was appearing in shop page titles and browser tabs. Replaced with "FermentFreude" across all shop and product page metadata.',notes:''},
  {id:'WEB-013',title:'Review product page information',category:'content',priority:'critical',status:'their-action',effort:'M',owners:['david','dev'],slug:'shop',description:'Check product pages for consistent price formatting, shelf life, storage, quantity UI, product availability and mandatory food information.',response:'Content review — David needs to verify that shelf life, storage instructions, quantity, and food labelling info are correct and complete for each product. All managed in the CMS under Products. David can update directly in /admin — no code change needed.',notes:''},
  {id:'WEB-014',title:'Workshop page QA',category:'content',priority:'must',status:'partial',effort:'M',owners:['dev','david','alaa'],slug:'workshops',description:'Review all workshop pages for max participants, dates, FAQs, CTAs, pricing, cancellation text and language consistency.',response:'David and Ala\'a go through each workshop page (Lakto, Kombucha, Tempeh, Basics) and check: correct dates, FAQs, pricing, cancellation text, language. Most content is in the CMS — David can fix directly. Code-level issues get flagged to Rafaela.',notes:''},
  {id:'WEB-015',title:'Analytics and conversion tracking audit',category:'performance',priority:'critical',status:'partial',effort:'M',owners:['david','dev'],slug:'',description:'Verify GA4, GTM and Clarity setup; confirm events for booking, voucher purchase, shop order, newsletter signup and contact form.',response:'Code side: done. GTM is integrated, all key GA4 e-commerce events are implemented — view item, add to cart, begin checkout, purchase, remove from cart. What lives inside the GTM container (GA4 tag, Clarity, Meta Pixel configuration) is David\'s responsibility via the GTM dashboard.',notes:''},
  {id:'WEB-016',title:'Performance and speed audit',category:'performance',priority:'must',status:'partial',effort:'M',owners:['dev','alaa'],slug:'',description:'Check loading times, Lighthouse, image sizes, fonts, caching, unnecessary requests and mobile performance.',response:'Images are optimised through the CMS pipeline (WebP, resized on upload). A formal Lighthouse pass makes sense once the main content QA items are resolved — no point benchmarking a page that still has placeholder content or language issues.',notes:''},
  {id:'WEB-017',title:'SEO basics audit',category:'content',priority:'must',status:'done',effort:'M',owners:['david','dev'],slug:'',description:'Check titles, meta descriptions, H1s, canonicals, sitemap, robots.txt, OpenGraph, structured data and slugs.',response:'Infrastructure done: dynamic sitemap, robots.txt, OpenGraph meta tags, canonical URLs, Payload SEO plugin for per-page titles and descriptions. /admin and /api blocked from crawlers. Content-level SEO (writing good titles and descriptions) is done by David directly in /admin.',notes:''},
  {id:'WEB-018',title:'Mobile QA — test on real devices',category:'design',priority:'must',status:'partial',effort:'M',owners:['alaa','david','dev'],slug:'',description:'Manually test every important page on mobile: layout, menus, CTAs, checkout, forms, text overflow and image cropping.',response:'Not done as a formal pass. Ala\'a and David should test on real phones — both Android and iPhone. Browser emulation misses things real devices surface. Flag specific pages and issues; Rafaela fixes the code ones.',notes:''},
  {id:'WEB-019',title:'Fix online course communication',category:'content',priority:'should',status:'their-action',effort:'XS',owners:['david','dev'],slug:'',description:'Clarify whether online courses are available or coming soon. Banner and menu must not contradict each other.',response:'Business decision. Are online courses available now, or coming soon? Once David decides the message, the banner text and navigation get updated — most of this is in the CMS. If something is in code, it\'s a quick fix.',notes:''},
  {id:'WEB-020',title:'Finish or hide Help / FAQ page',category:'content',priority:'should',status:'their-action',effort:'XS',owners:['david','dev'],slug:'faq',description:'The Help page should either contain useful answers or be removed from navigation/footer until ready.',response:'Content decision. If the page isn\'t ready, hide it from navigation and footer until it has real answers — an empty help page reduces trust. David decides: finish the content now, or hide the link. Either option is a 5-minute change.',notes:''},
  {id:'WEB-021',title:'Check footer and social links',category:'bug',priority:'should',status:'their-action',effort:'XS',owners:['david','alaa'],slug:'',description:'Manually test Instagram, Facebook, LinkedIn and all footer links. Fix suspicious/wrong URLs.',response:'Manual click test — David or Ala\'a goes through every footer link and social icon. Social URLs are managed in the CMS (Footer global in /admin), so any wrong link David can fix himself immediately. Only needs a developer if a link is hardcoded in the code.',notes:''},
  {id:'WEB-022',title:'Fix image alt text and names',category:'content',priority:'should',status:'their-action',effort:'XS',owners:['david','dev'],slug:'',description:'Correct misspelled names or irrelevant alt text such as David Heider / Marcel Rauminger if present.',response:'Alt text is set when images are uploaded in the CMS. David can update alt text directly in /admin → Media for any image. Developer only needed if something is hardcoded in the code.',notes:''},
  {id:'WEB-023',title:'Self-service creation of new workshop types',category:'feature',priority:'critical',status:'done',effort:'M',owners:['dev','david'],slug:'admin',description:'David/Marcel must be able to create one-off partner workshops and new workshop types without code changes — including title, date, location, capacity, price, description, images, FAQ, booking and automated emails.',response:'Done. David and Marcel can already create new workshop appointment slots, set dates, times, locations, and available spots directly in /admin → Workshop Appointments. Changes go live immediately. A full founders guide exists. No developer needed for day-to-day workshop management.',notes:''},
  {id:'WEB-024',title:'Workshop booking overview in dashboard',category:'feature',priority:'must',status:'done',effort:'M',owners:['dev'],slug:'admin',description:'Show bookings clearly in the dashboard: name, date, product/workshop, payment status, email status, notes.',response:'Done. Bookings and workshop appointments are visible in the Payload admin. If specific columns or views need to be adjusted — for example a cleaner summary view — that\'s a quick improvement. Flag what\'s missing and it gets added.',notes:''},
  {id:'WEB-025',title:'Individual voucher personalization',category:'feature',priority:'should',status:'future',effort:'M',owners:['dev','david'],slug:'voucher',description:'Allow customer name, recipient name, message or voucher design customization if feasible.',response:'Future feature. Custom names, messages, or designs on vouchers requires additional development. Scope and quote when the time comes — good to do before a gift season (Christmas, Valentine\'s).',notes:''},
  {id:'WEB-026',title:'Transactional email audit',category:'feature',priority:'must',status:'done',effort:'M',owners:['dev','david'],slug:'',description:'Check all automated emails: booking confirmation, invoice, voucher delivery, reminder, cancellation/reschedule if needed.',response:'Done. All automated emails are set up in Brevo: booking confirmation, invoice, voucher delivery, welcome email, password reset. Triggers come from Stripe webhooks and Payload hooks. Cancellation email listed separately as WEB-033.',notes:''},
  {id:'WEB-027',title:'Backup strategy',category:'org',priority:'critical',status:'done',effort:'M',owners:['dev'],slug:'',description:'Clarify automatic backups for MongoDB, R2 assets, code, CMS content and recovery process.',response:'Mostly covered. Code: backed up on GitHub with full history. Deployment: Vercel keeps all snapshots — instant rollback. Database: MongoDB Atlas includes automatic daily backups. Media (Cloudflare R2): no automatic backup — this is the one gap. A manual backup schedule should be agreed and documented.',notes:''},
  {id:'WEB-028',title:'Rollback / deployment recovery process',category:'org',priority:'critical',status:'done',effort:'XS',owners:['dev'],slug:'',description:'Document how to rollback if a deployment breaks the website.',response:'Built into Vercel. Every deployment is saved and can be instantly re-activated with one click from the Vercel dashboard — no terminal or code needed. Rollback takes under 60 seconds. A one-page guide for David showing exactly where to click is worth adding.',notes:''},
  {id:'WEB-029',title:'Access rights and 2FA audit',category:'org',priority:'critical',status:'their-action',effort:'M',owners:['david','marcel','dev'],slug:'',description:'Check admin rights, least privilege, two-factor authentication and backup admins for all critical systems.',response:'Each person reviews and secures their own accounts — nobody can manage another person\'s account security. David and Marcel should enable 2FA on Stripe, Brevo, Google (GTM/GA4), and EasyName. Rafaela handles Vercel, GitHub, MongoDB, and Cloudflare R2.',notes:''},
  {id:'WEB-030',title:'Knowledge hub / blog roadmap',category:'feature',priority:'nice',status:'future',effort:'M',owners:['david'],slug:'',description:'Plan future content structure for fermentation knowledge, recipes and SEO without overloading current launch phase.',response:'Parked. Strong SEO potential but not the right time to build it. The CMS is already capable of supporting a blog when the decision is made — additive feature, not a rebuild. Define content pillars when the rest of the site is stable.',notes:''},
  {id:'WEB-031',title:'Online course platform',category:'feature',priority:'nice',status:'future',effort:'XL',owners:['david','dev'],slug:'',description:'Online courses directly on the website.',response:'Parked. Needs a business model decision before any development. Specialist course platforms (Teachable, Kajabi) vs. building inside this system are very different paths with very different costs. Scope properly when the product is ready.',notes:''},
  {id:'WEB-032',title:'B2B order area',category:'feature',priority:'nice',status:'future',effort:'XL',owners:['david','marcel','dev'],slug:'',description:'Long-term idea: gastronomy customers can order products directly via a B2B area.',response:'Parked. A full B2B ordering system is a significant build. Makes sense when recurring B2B sales are happening at volume and the manual process becomes a real bottleneck.',notes:''},
  {id:'WEB-033',title:'Cancellation of workshops and individual bookings',category:'feature',priority:'critical',status:'open',effort:'XL',owners:['dev','david'],slug:'workshops',description:'Cancel a workshop and have all customers get an automated email. Also cancel individual customer bookings from the dashboard with Stripe refunds.',response:'Valid and important — not yet built. Two separate things: (1) David cancels entire workshop session, all attendees automatically get a cancellation email; (2) David cancels individual customer booking, that specific customer gets an email. Both require new admin logic, Brevo cancellation email template, and Stripe refund handling. Needs scope + quote as paid development work.',notes:''},
]
SEED.forEach(i=>i.board='current')

// New items from David's operational use-case brief (2026-07-09), broken out of WEB-033
const NEW_CASES=[
  {id:'CASE-01',title:'Case 1: Cancel a full workshop date',category:'feature',priority:'critical',status:'open',effort:'L',owners:['dev','david'],slug:'workshops',related:'WEB-033',description:'A workshop date has paid bookings but can\'t run (illness, too few sign-ups, scheduling conflict). Need to cancel the date, notify everyone automatically, and offer a way to move to another date without losing their payment.',response:'Depends on Decision 1 (how customers reclaim their booking). Once decided: David marks the appointment cancelled with a reason, every affected booking gets emailed automatically via Brevo, and gets a way to rebook. Admin can still move anyone manually as a fallback.',notes:''},

NEW_CASES.forEach(i=>i.board='new')
const ALL_SEED=[...SEED,...NEW_CASES]

let items=[],activeBoard='current',activeFilter='all',searchQ='',catFilter='',sortBy='priority',selectedId=null,editingId=null,mPriority='must',mEffort='M',mOwners=[],toastTimer=null

function init(){
  try{const s=localStorage.getItem('ff-backlog-v2');items=s?JSON.parse(s):clone(ALL_SEED)}catch(e){items=clone(ALL_SEED)}
  renderAll()
  document.addEventListener('keydown',onKey)
}
function clone(x){return JSON.parse(JSON.stringify(x))}
function persist(){localStorage.setItem('ff-backlog-v2',JSON.stringify(items))}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function renderAll(){renderBoardToggle();renderStats();renderFilters();renderList();if(selectedId)renderDetail()}

function renderBoardToggle(){
  const newCount=items.filter(i=>i.board==='new').length
  document.getElementById('board-toggle').innerHTML=`
    <button class="board-btn ${activeBoard==='current'?'active':''}" onclick="setBoard('current')">Current Backlog</button>
    <button class="board-btn ${activeBoard==='new'?'active':''}" onclick="setBoard('new')">New — David's Brief (${newCount})</button>`
}
function setBoard(b){
  if(activeBoard===b)return
  activeBoard=b;activeFilter='all';searchQ='';catFilter=''
  const s=document.getElementById('search');if(s)s.value=''
  const c=document.getElementById('cat-filter');if(c)c.value=''
  selectedId=null
  document.getElementById('detail-panel').classList.remove('open')
  renderAll()
}
function boardItems(){return items.filter(i=>i.board===activeBoard)}

function renderStats(){
  const scoped=boardItems()
  if(activeBoard==='new'){
    const decisions=scoped.filter(i=>i.category==='decision')
    const answered=decisions.filter(i=>i.decision&&i.decision.choice).length
    const crit=scoped.filter(i=>i.priority==='critical'&&i.status!=='done').length
    document.getElementById('stats-grid').innerHTML=`
      <div class="stat-cell" onclick="setFilter('decisions')"><div class="stat-num ${answered<decisions.length?'red':''}">${answered}/${decisions.length}</div><div class="stat-label">Decisions answered</div></div>
      <div class="stat-cell" onclick="setFilter('critical')"><div class="stat-num red">${crit}</div><div class="stat-label">Critical</div></div>
      <div class="stat-cell" onclick="setFilter('all')"><div class="stat-num">${scoped.length}</div><div class="stat-label">Total items</div></div>
      <div class="stat-cell" onclick="setFilter('open')"><div class="stat-num">${scoped.filter(i=>i.status==='open').length}</div><div class="stat-label">Open</div></div>`
    return
  }
  const crit=scoped.filter(i=>i.priority==='critical'&&i.status!=='done').length
  const open=scoped.filter(i=>i.status==='open').length
  const done=scoped.filter(i=>i.status==='done').length
  const their=scoped.filter(i=>i.status==='their-action').length
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-cell" onclick="setFilter('critical')"><div class="stat-num red">${crit}</div><div class="stat-label">Critical</div></div>
    <div class="stat-cell" onclick="setFilter('open')"><div class="stat-num">${open}</div><div class="stat-label">Open</div></div>
    <div class="stat-cell" onclick="setFilter('done')"><div class="stat-num">${done}</div><div class="stat-label">Done</div></div>
    <div class="stat-cell" onclick="setFilter('their-action')"><div class="stat-num">${their}</div><div class="stat-label">Their action</div></div>`
}

const FNAV=[
  {id:'all',label:'All items'},
  {sep:true},
  {id:'critical',label:'★ Critical',dot:'#B91C1C'},
  {id:'must',label:'Must-have',dot:'#B45309'},
  {id:'should',label:'Should-have',dot:'#1D4ED8'},
  {id:'nice',label:'Nice to have',dot:'#9CA3AF'},
  {sep:true},
  {id:'open',label:'Open',dot:'#3B82F6'},
  {id:'partial',label:'In Progress',dot:'#F59E0B'},
  {id:'their-action',label:'Their Action',dot:'#8B5CF6'},
  {id:'done',label:'Done',dot:'#22C55E'},
  {id:'future',label:'Parked',dot:'#94A3B8'},
  {sep:true},
  {id:'decisions',label:'\u2756 Decisions',dot:'#0E7490'},
  {sep:true},
  {id:'dev',label:'Dev work'},
  {id:'founders',label:"Founders' work"},
]

function itemsFor(fid){
  return boardItems().filter(i=>{
    if(fid==='all')return true
    if(fid==='critical')return i.priority==='critical'&&i.status!=='done'
    if(fid==='must')return i.priority==='must'
    if(fid==='should')return i.priority==='should'
    if(fid==='nice')return i.priority==='nice'
    if(fid==='open')return i.status==='open'
    if(fid==='partial')return i.status==='partial'
    if(fid==='their-action')return i.status==='their-action'
    if(fid==='blocked')return i.status==='blocked'
    if(fid==='done')return i.status==='done'
    if(fid==='future')return i.status==='future'
    if(fid==='decisions')return i.category==='decision'
    if(fid==='dev')return i.owners.some(o=>o==='dev'||o==='alaa')
    if(fid==='founders')return i.owners.some(o=>o==='david'||o==='marcel')
    return true
  })
}

function renderFilters(){
  document.getElementById('filter-nav').innerHTML=FNAV.map(f=>{
    if(f.sep)return'<div class="fnav-sep"></div>'
    const cnt=itemsFor(f.id).length
    const dot=f.dot?`<span class="fdot" style="background:${f.dot}"></span>`:'<span style="width:8px;flex-shrink:0"></span>'
    return`<button class="filter-btn ${activeFilter===f.id?'active':''}" onclick="setFilter('${f.id}')">${dot}<span>${f.label}</span><span class="fcount">${cnt}</span></button>`
  }).join('')
}
function setFilter(id){activeFilter=id;renderAll()}

function visibleItems(){
  let list=itemsFor(activeFilter)
  if(catFilter)list=list.filter(i=>i.category===catFilter)
  if(searchQ){const q=searchQ.toLowerCase();list=list.filter(i=>i.title.toLowerCase().includes(q)||i.id.toLowerCase().includes(q)||(i.description||'').toLowerCase().includes(q)||(i.slug||'').toLowerCase().includes(q))}
  return[...list].sort((a,b)=>{
    if(sortBy==='priority'){const d=PRI_ORDER[a.priority]-PRI_ORDER[b.priority];return d||a.id.localeCompare(b.id)}
    if(sortBy==='id')return a.id.localeCompare(b.id)
    if(sortBy==='effort')return EFF_ORDER[a.effort]-EFF_ORDER[b.effort]
    if(sortBy==='status')return a.status.localeCompare(b.status)
    return 0
  })
}

function renderList(){
  const list=visibleItems(),el=document.getElementById('item-list')
  if(!list.length){el.innerHTML='<div class="empty-msg"><strong>No items found</strong>Try a different filter or search.</div>';return}
  el.innerHTML=list.map(item=>{
    const decMark=item.decision?(item.decision.choice?'<span title="Answered" style="color:#22C55E;font-size:10px">\u25CF</span>':'<span title="Needs an answer" style="color:#B91C1C;font-size:10px">\u25CF</span>'):''
    return`
    <div class="item-card ${item.id===selectedId?'sel':''}" onclick="selectItem('${item.id}')">
      <div class="prail" style="background:${PRI_COLORS[item.priority]}"></div>
      <div class="cbody">
        <span class="cid">${item.id}</span>
        ${decMark}
        <span class="ctitle">${esc(item.title)}</span>
      </div>
    </div>`}).join('')
}

function selectItem(id){selectedId=id;document.getElementById('detail-panel').classList.add('open');renderList();renderDetail()}
function closeDetail(){selectedId=null;document.getElementById('detail-panel').classList.remove('open');renderList()}

function renderDetail(){
  const item=items.find(i=>i.id===selectedId)
  if(!item)return
  const pc=PRI_COLORS[item.priority]
  document.getElementById('detail-badges').innerHTML=`<span class="cbadge ${item.category}">${item.category}</span><span class="spill ${item.status}">${STATUS_LABELS[item.status]}</span>`
  document.getElementById('detail-id').textContent=item.id
  document.getElementById('detail-title').textContent=item.title
  document.getElementById('detail-hd').style.borderLeft=`3px solid ${pc}`
  const owners=item.owners.map(o=>`<span class="ochip">${OWNER_LABELS[o]||o}</span>`).join('')
  const slugRow=item.slug?`<div><div class="dm-label">Page</div><div class="dm-value" style="font-family:monospace;font-size:12px">/${esc(item.slug)}</div></div>`:''
  const relatedRow=item.related?`<div><div class="dm-label">Related</div><div class="dm-value" style="color:#1D4ED8;cursor:pointer;font-weight:600" onclick="jumpTo('${item.related}')">${esc(item.related)} \u2192</div></div>`:''
  const decisionSection=item.decision?`
    <div class="d-section">
      <div class="d-block-label">Decision needed</div>
      <div class="d-text" style="margin-bottom:10px">${esc(item.decision.question)}</div>
      <div class="dec-options">
        ${Object.entries(item.decision.options).map(([key,o])=>`
          <div class="dec-opt ${item.decision.choice===key?'sel':''}" onclick="pickDecision('${item.id}','${key}')">
            <div class="dec-dot"></div>
            <div>
              <div class="dec-name">${esc(o.label)}${o.recommended?'<span class="dec-rec">Recommended</span>':''}</div>
              <div class="dec-desc">${esc(o.desc)}</div>
            </div>
          </div>`).join('')}
      </div>
      <textarea id="dec-notes" class="d-textarea" placeholder="Notes on this decision…" style="min-height:60px">${esc(item.decision.notes||'')}</textarea>
      <button class="btn btn-red" style="margin-top:8px" onclick="saveDecisionNotes('${item.id}')">Save decision notes</button>
    </div>`:''
  document.getElementById('detail-body').innerHTML=`
    <div class="dmeta-grid">
      <div><div class="dm-label">Priority</div><div class="dm-value" style="color:${pc};font-weight:600">${PRI_LABELS[item.priority]}</div></div>
      <div><div class="dm-label">Effort</div><div class="dm-value"><span class="etag">${item.effort}</span></div></div>
      <div><div class="dm-label">Owner</div><div class="dm-value">${owners}</div></div>
      ${slugRow}
      ${relatedRow}
    </div>
    ${item.description?`<div class="d-section"><div class="d-block-label">Description</div><div class="d-text">${esc(item.description)}</div></div>`:''}
    ${item.response?`<div class="d-section"><div class="d-block-label">Response / Plan</div><div class="d-text-box">${esc(item.response)}</div></div>`:''}
    ${decisionSection}
    <div class="d-section">
      <div class="d-block-label">Next Steps</div>
      ${(item.todos||[]).length ? `<div class="todo-list">${(item.todos||[]).map(t=>`
        <div class="todo-item ${t.done?'tdone':''}">
          <input class="todo-cb" type="checkbox" ${t.done?'checked':''} onchange="toggleTodo('${item.id}','${t.id}')">
          <span class="todo-text">${esc(t.text)}</span>
          <button class="todo-del" onclick="deleteTodo('${item.id}','${t.id}')">✕</button>
        </div>`).join('')}</div>` : '<div class="todo-empty">No next steps yet.</div>'}
      <div class="todo-add-row">
        <input class="fi" id="todo-input" placeholder="Add a next step…" onkeydown="if(event.key==='Enter')addTodo()">
        <button class="todo-add-btn" onclick="addTodo()">Add</button>
      </div>
    </div>
    <div class="d-section">
      <div class="d-block-label">Notes <span style="font-weight:400;text-transform:none;letter-spacing:0">(private · save with button)</span></div>
      <textarea id="detail-notes" class="d-textarea" placeholder="Meeting notes, decisions, links…">${esc(item.notes||'')}</textarea>
    </div>`
}

function saveNotes(){
  const item=items.find(i=>i.id===selectedId),el=document.getElementById('detail-notes')
  if(!item||!el)return
  item.notes=el.value;persist();showToast('Notes saved')
}

function pickDecision(itemId,key){
  const item=items.find(i=>i.id===itemId)
  if(!item||!item.decision)return
  item.decision.choice=key
  persist();renderDetail();renderStats();renderList()
}
function saveDecisionNotes(id){
  const item=items.find(i=>i.id===id),el=document.getElementById('dec-notes')
  if(!item||!item.decision||!el)return
  item.decision.notes=el.value;persist();showToast('Decision notes saved')
}
function jumpTo(id){
  const it=items.find(i=>i.id===id)
  if(!it)return
  activeBoard=it.board;activeFilter='all';searchQ='';catFilter=''
  const s=document.getElementById('search');if(s)s.value=''
  const c=document.getElementById('cat-filter');if(c)c.value=''
  selectedId=id
  document.getElementById('detail-panel').classList.add('open')
  renderAll()
}

function openModal(id){
  editingId=id||null;mPriority='must';mEffort='M';mOwners=[]
  document.getElementById('modal-title').textContent=id?`Edit ${id}`:'New item'
  document.getElementById('modal-del').style.display=id?'block':'none'
  if(id){
    const it=items.find(i=>i.id===id)
    document.getElementById('m-title').value=it.title
    document.getElementById('m-cat').value=it.category
    document.getElementById('m-status').value=it.status
    document.getElementById('m-slug').value=it.slug||''
    document.getElementById('m-desc').value=it.description||''
    document.getElementById('m-resp').value=it.response||''
    mPriority=it.priority;mEffort=it.effort;mOwners=[...(it.owners||[])]
  }else{
    document.getElementById('m-title').value=''
    document.getElementById('m-cat').value='bug'
    document.getElementById('m-status').value='open'
    document.getElementById('m-slug').value=''
    document.getElementById('m-desc').value=''
    document.getElementById('m-resp').value=''
  }
  updPriUI();updEffUI();updOwnUI()
  document.getElementById('modal-overlay').classList.remove('hidden')
  setTimeout(()=>document.getElementById('m-title').focus(),60)
}
function closeModal(){document.getElementById('modal-overlay').classList.add('hidden');editingId=null}
function overlayClick(e){if(e.target.id==='modal-overlay')closeModal()}
function selPriority(p){mPriority=p;updPriUI()}
function updPriUI(){document.querySelectorAll('.popt').forEach(el=>el.classList.toggle('sel',el.id==='po-'+mPriority))}
function selEffort(e){mEffort=e;updEffUI()}
function updEffUI(){document.querySelectorAll('.eopt').forEach(el=>el.classList.toggle('sel',el.dataset.e===mEffort))}
function togOwner(o){mOwners.includes(o)?mOwners=mOwners.filter(x=>x!==o):mOwners.push(o);updOwnUI()}
function updOwnUI(){document.querySelectorAll('.oopt').forEach(el=>el.classList.toggle('sel',mOwners.includes(el.dataset.o)))}
function nextId(){
  if(activeBoard==='current'){
    const nums=items.filter(i=>i.board==='current').map(i=>parseInt(i.id.replace('WEB-',''),10)).filter(n=>!isNaN(n))
    return'WEB-'+String((nums.length?Math.max(...nums):0)+1).padStart(3,'0')
  }
  const nums=items.filter(i=>i.board==='new'&&/^CASE-\d+$/.test(i.id)).map(i=>parseInt(i.id.replace('CASE-',''),10)).filter(n=>!isNaN(n))
  return'CASE-'+String((nums.length?Math.max(...nums):0)+1).padStart(2,'0')
}
function saveModal(){
  const title=document.getElementById('m-title').value.trim()
  if(!title){document.getElementById('m-title').focus();return}
  if(!mOwners.length)mOwners=['dev']
  const data={title,category:document.getElementById('m-cat').value,status:document.getElementById('m-status').value,priority:mPriority,effort:mEffort,owners:mOwners,slug:document.getElementById('m-slug').value.replace(/^\/+/,'').trim(),description:document.getElementById('m-desc').value.trim(),response:document.getElementById('m-resp').value.trim()}
  if(editingId){const idx=items.findIndex(i=>i.id===editingId);items[idx]={...items[idx],...data};showToast('Saved');if(selectedId===editingId)renderDetail()}
  else{items.push({id:nextId(),notes:'',board:activeBoard,...data});showToast('Item created')}
  persist();closeModal();renderAll()
}
function deleteCurrentModal(){if(editingId)deleteItem(editingId)}
function deleteItem(id){
  if(!id)return
  if(!confirm(`Delete ${id}? This cannot be undone.`))return
  items=items.filter(i=>i.id!==id)
  if(selectedId===id)closeDetail()
  closeModal();persist();renderAll();showToast(`${id} deleted`)
}
function addTodo(){
  const inp=document.getElementById('todo-input'),text=(inp?.value||'').trim()
  if(!text||!selectedId)return
  const item=items.find(i=>i.id===selectedId)
  if(!item)return
  if(!item.todos)item.todos=[]
  item.todos.push({id:Date.now()+'-'+Math.random().toString(36).slice(2),text,done:false})
  persist();inp.value='';renderDetail()
  setTimeout(()=>{const el=document.getElementById('todo-input');if(el)el.focus()},20)
}
function toggleTodo(itemId,todoId){
  const item=items.find(i=>i.id===itemId)
  if(!item?.todos)return
  const t=item.todos.find(t=>t.id===todoId)
  if(t){t.done=!t.done;persist();renderDetail()}
}
function deleteTodo(itemId,todoId){
  const item=items.find(i=>i.id===itemId)
  if(!item?.todos)return
  item.todos=item.todos.filter(t=>t.id!==todoId)
  persist();renderDetail()
}
function onSearch(){searchQ=document.getElementById('search').value;renderList();renderFilters()}
function onCatFilter(){catFilter=document.getElementById('cat-filter').value;renderList()}
function onSort(){sortBy=document.getElementById('sort-sel').value;renderList()}
function onKey(e){
  const tag=document.activeElement.tagName
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return
  if(e.key==='n'||e.key==='N'){e.preventDefault();openModal(null)}
  if(e.key==='Escape'){closeModal();closeDetail()}
}
function showToast(msg){
  const t=document.getElementById('toast')
  t.textContent=msg;t.classList.add('show')
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200)
}
init()
</script>
